<title>Daily Hindi · हिन्दी</title>

<style>
  :root {
    --bg: #f5efe2;
    --ink: #1a1612;
    --accent: #c24e2a;
    --muted: #8a7d6a;
    --card: #fbf7ec;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--ink); font-family: 'Shippori Mincho', 'Noto Serif JP', serif; min-height: 100vh; }
  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(194,78,42,0.04), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(26,22,18,0.05), transparent 40%);
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  button { font-family: inherit; cursor: pointer; border: none; background: transparent; color: inherit; }
  .hi-script { font-family: 'Tiro Devanagari Hindi', serif; letter-spacing: 0.01em; }

  .container { max-width: 560px; margin: 0 auto; padding: 32px 20px 80px; }

  header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; }
  .brand-tag { font-size: 11px; letter-spacing: 0.25em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .brand-hi { font-size: 38px; line-height: 1; color: var(--ink); }
  .streak { text-align: right; }
  .streak-label { font-size: 11px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
  .streak-num { font-size: 28px; font-weight: 600; color: var(--accent); line-height: 1; }
  .streak-unit { font-size: 14px; color: var(--muted); font-weight: 400; margin-left: 4px; }

  .progress { margin-bottom: 32px; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.05em; }
  .progress-bar { height: 3px; background: rgba(26,22,18,0.08); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.4s; }

  .tabs { display: flex; gap: 8px; margin-bottom: 24px; justify-content: center; }
  .tab { padding: 8px 16px; border-radius: 999px; font-size: 13px; letter-spacing: 0.05em; transition: all 0.2s; color: var(--muted); }
  .tab.active { background: var(--ink); color: var(--bg); }

  .card { background: var(--card); border: 1px solid rgba(26,22,18,0.08); border-radius: 20px; box-shadow: 0 1px 0 rgba(26,22,18,0.04), 0 20px 40px -20px rgba(26,22,18,0.12); }
  .card-today { padding: 36px 28px 28px; text-align: center; margin-bottom: 20px; }
  .chip { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; letter-spacing: 0.08em; background: rgba(194,78,42,0.1); color: var(--accent); border: 1px solid rgba(194,78,42,0.2); }
  .big-hi { font-size: 44px; line-height: 1.4; margin: 24px 0 12px; color: var(--ink); }
  .romaji { font-size: 16px; color: var(--muted); font-style: italic; margin-bottom: 4px; }
  .kana { font-size: 15px; color: var(--ink); margin-bottom: 8px; letter-spacing: 0.05em; }
  .divider { height: 1px; background: rgba(26,22,18,0.1); margin: 20px auto; width: 40px; }
  .jp-text { font-size: 17px; color: var(--ink); font-weight: 500; margin-bottom: 12px; }
  .jp-note { font-size: 13px; color: var(--muted); line-height: 1.65; text-align: left; padding: 0 4px; letter-spacing: 0.02em; }

  .btn-primary { background: var(--ink); color: var(--bg); padding: 12px 20px; border-radius: 999px; font-size: 14px; letter-spacing: 0.04em; transition: transform 0.15s; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-ghost { border: 1px solid rgba(26,22,18,0.2); padding: 10px 18px; border-radius: 999px; font-size: 13px; transition: all 0.15s; }
  .btn-ghost:hover { background: rgba(26,22,18,0.05); }
  .btn-listen { border: 1px solid rgba(26,22,18,0.15); width: 40px; height: 40px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; transition: all 0.15s; margin: 8px auto 0; }
  .btn-listen:hover, .btn-listen:active { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-listen:active { transform: scale(0.92); }

  .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

  .list { overflow: hidden; }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid rgba(26,22,18,0.06); cursor: pointer; transition: background 0.15s; }
  .row:last-child { border-bottom: none; }
  .row:hover { background: rgba(26,22,18,0.03); }
  .row-text { flex: 1; min-width: 0; }
  .row-hi { font-size: 20px; margin-bottom: 2px; }
  .row-jp { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid rgba(26,22,18,0.25); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; }
  .check.done { background: var(--accent); border-color: var(--accent); color: white; }

  .back-btn { margin-bottom: 20px; }

  .footer { text-align: center; margin-top: 40px; }
  .reset-btn { font-size: 11px; letter-spacing: 0.1em; color: var(--muted); }
</style>
</head>

<div id="app"></div>
<script>
const PHRASES = [
  // 挨拶 (id 1-5, 31-35)
  { id:1,  hi:"नमस्ते", romaji:"Namaste", kana:"ナマステ", jp:"こんにちは / ご挨拶全般", note:"朝昼晩・初対面・別れのどれでも使える万能挨拶。両手を合わせるナマステのポーズと共に。最も丁寧で目上の人にも安全。", cat:"挨拶" },
  { id:2,  hi:"धन्यवाद", romaji:"Dhanyavaad", kana:"ダンニャワード", jp:"ありがとう(丁寧)", note:"フォーマルな場面での感謝表現。ビジネスや目上の人向け。サンスクリット語源で、シュクリヤーより硬い響き。", cat:"挨拶" },
  { id:3,  hi:"शुक्रिया", romaji:"Shukriya", kana:"シュクリヤー", jp:"ありがとう(カジュアル)", note:"日常の軽い感謝。友人・同僚・店員向け。ペルシャ語起源で口語でよく使う。「Thanks」の感覚に近い。", cat:"挨拶" },
  { id:4,  hi:"अलविदा", romaji:"Alvida", kana:"アルヴィダー", jp:"さようなら", note:"長く会えない時の正式な別れ。普段の「じゃあね」には重すぎる。帰国時や長期離任時に。", cat:"挨拶" },
  { id:5,  hi:"फिर मिलेंगे", romaji:"Phir milenge", kana:"フィル ミレンゲー", jp:"また会いましょう", note:"直訳は「再び会うだろう」。次回の予定がある時の自然な別れ。ビジネスでも日常でも万能。", cat:"挨拶" },
  { id:31, hi:"सुप्रभात", romaji:"Suprabhat", kana:"スプラバート", jp:"おはようございます", note:"朝の丁寧な挨拶。ただし口語ではナマステで済ませることも多い。メールや手紙の書き出しにも最適。", cat:"挨拶" },
  { id:32, hi:"शुभ रात्रि", romaji:"Shubh raatri", kana:"シュバ ラートリ", jp:"おやすみなさい", note:"就寝前の挨拶。電話やメッセージを終える時にも使える。シュバ=良い、ラートリ=夜。", cat:"挨拶" },
  { id:33, hi:"स्वागत है", romaji:"Swagat hai", kana:"スワーガト ハェ", jp:"ようこそ", note:"訪問者を迎える時の表現。ホスト側として使う。「インドへようこそ」なら भारत में स्वागत है。", cat:"挨拶" },
  { id:34, hi:"आपका दिन शुभ हो", romaji:"Aapka din shubh ho", kana:"アープカー ディン シュバ ホー", jp:"良い一日を", note:"「Have a nice day」に相当。別れ際に。ビジネスメールの結びにも使える。", cat:"挨拶" },
  { id:35, hi:"कैसे हो?", romaji:"Kaise ho?", kana:"カイセー ホー?", jp:"元気?(カジュアル)", note:"友人・部下向けの砕けた挨拶。丁寧形は आप कैसे हैं?。相手との距離感で使い分ける。", cat:"挨拶" },

  // 自己紹介 (id 6-10, 36-40)
  { id:6,  hi:"मेरा नाम ... है", romaji:"Mera naam ... hai", kana:"メーラー ナーム ... ハェ", jp:"私の名前は...です", note:"名刺交換時の定番。「...」に自分の名前を入れる。例:Mera naam Jack hai。メーラー=私の、ナーム=名前、ハェ=です。", cat:"自己紹介" },
  { id:7,  hi:"आप कैसे हैं?", romaji:"Aap kaise hain?", kana:"アープ カイセー ハェン?", jp:"お元気ですか?", note:"丁寧形の「元気ですか」。ビジネス・初対面向け。返答は「メン ティーク フーン(元気です)」。", cat:"自己紹介" },
  { id:8,  hi:"मैं ठीक हूँ", romaji:"Main thik hoon", kana:"メン ティーク フーン", jp:"元気です", note:"上の質問への標準返答。Thikは「OK」の意味で汎用的に使える便利語。", cat:"自己紹介" },
  { id:9,  hi:"मैं जापान से हूँ", romaji:"Main Japan se hoon", kana:"メン ジャパーン セ フーン", jp:"日本から来ました", note:"出身を伝える時。「से(セ)」は「〜から」。इंडिया(インド)、थाईलैंड(タイ)など国名に差し替え可能。", cat:"自己紹介" },
  { id:10, hi:"मिलकर खुशी हुई", romaji:"Milkar khushi hui", kana:"ミルカル クシー フイー", jp:"お会いできて嬉しいです", note:"初対面の握手時・別れ際に。「Nice to meet you」相当。クシー=喜び。", cat:"自己紹介" },
  { id:36, hi:"आपका नाम क्या है?", romaji:"Aapka naam kya hai?", kana:"アープカー ナーム キャー ハェ?", jp:"お名前は何ですか?", note:"相手の名前を尋ねる丁寧な表現。カジュアルなら तुम्हारा नाम क्या है?。", cat:"自己紹介" },
  { id:37, hi:"मैं एक कंसल्टेंट हूँ", romaji:"Main ek consultant hoon", kana:"メン エーク コンサルタント フーン", jp:"私はコンサルタントです", note:"職業を伝える基本形。「Consultant」は英語そのまま。職業名を入れ替えれば他の職種にも応用可。", cat:"自己紹介" },
  { id:38, hi:"मैं बैंकॉक में रहता हूँ", romaji:"Main Bangkok mein rehta hoon", kana:"メン バンコック メン レヘター フーン", jp:"バンコクに住んでいます", note:"居住地を伝える。रहता は男性形、女性は रहती。地名+में(メン)で「〜に」。", cat:"自己紹介" },
  { id:39, hi:"यह मेरा दोस्त है", romaji:"Yeh mera dost hai", kana:"イェ メーラー ドースト ハェ", jp:"これは私の友人です", note:"同行者を紹介する時。ドーストは男友達、女友達なら मेरी दोस्त。यह(イェ)は「これ/この人」。", cat:"自己紹介" },
  { id:40, hi:"मैं हिन्दी सीख रहा हूँ", romaji:"Main Hindi seekh raha hoon", kana:"メン ヒンディー セーク ラハー フーン", jp:"ヒンディー語を学んでいます", note:"これを言うと相手が必ず喜ぶ・褒めてくれる鉄板フレーズ。सीख रहा हूँ で進行形「学び中」。", cat:"自己紹介" },

  // 丁寧・感情 (id 11-15, 41-45)
  { id:11, hi:"कृपया", romaji:"Kripya", kana:"クリパヤー", jp:"どうぞ / お願いします", note:"フォーマルな「Please」。文の前後どちらにも置ける。口語では省略されることも多い。", cat:"丁寧" },
  { id:12, hi:"माफ़ कीजिए", romaji:"Maaf kijiye", kana:"マーフ キージエ", jp:"すみません / ごめんなさい", note:"謝罪と、人に話しかける時の「Excuse me」両方に使える。マーフ=許し。", cat:"丁寧" },
  { id:13, hi:"कोई बात नहीं", romaji:"Koi baat nahin", kana:"コイー バート ナヒーン", jp:"問題ありません / 大丈夫", note:"謝られた時の「気にしないで」。「No problem」相当で超頻出。直訳は「何の事もない」。", cat:"丁寧" },
  { id:14, hi:"ज़रूर", romaji:"Zaroor", kana:"ザルール", jp:"もちろん", note:"依頼に対する快諾。「Sure」「Of course」相当。単独で使えて便利。", cat:"丁寧" },
  { id:15, hi:"बिल्कुल", romaji:"Bilkul", kana:"ビルクル", jp:"その通り / 完全に", note:"強い同意。「Absolutely」「Exactly」相当。相槌としても強調の副詞としても使える。", cat:"丁寧" },
  { id:41, hi:"मुझे खुशी है", romaji:"Mujhe khushi hai", kana:"ムジェ クシー ハェ", jp:"嬉しいです", note:"直訳「私に喜びがある」。ヒンディーの感情表現は「私」ではなく「私に」が主語になる独特の構造。", cat:"丁寧" },
  { id:42, hi:"मुझे अफ़सोस है", romaji:"Mujhe afsos hai", kana:"ムジェ アフソース ハェ", jp:"残念です", note:"残念な知らせを受けた時や、自分の失敗を詫びる時。「I'm sorry (to hear that)」相当。", cat:"丁寧" },
  { id:43, hi:"मुझे पसंद है", romaji:"Mujhe pasand hai", kana:"ムジェ パサンド ハェ", jp:"好きです", note:"物事を気に入った時。前に対象を置く:「यह मुझे पसंद है(これが好き)」。パサンド=好み。", cat:"丁寧" },
  { id:44, hi:"आप बहुत दयालु हैं", romaji:"Aap bahut dayaalu hain", kana:"アープ バフット ダヤールー ハェン", jp:"とても親切ですね", note:"ビジネスや接待で使える褒め言葉。親切にされた時のお礼としても自然。ダヤールー=親切な。", cat:"丁寧" },
  { id:45, hi:"मैं सहमत हूँ", romaji:"Main sehmat hoon", kana:"メン セヘマト フーン", jp:"同意します", note:"会議での意思表明に。「I agree」相当。逆は मैं असहमत हूँ(同意しません)。", cat:"丁寧" },

  // 基本 (id 16-20, 46-50)
  { id:16, hi:"हाँ", romaji:"Haan", kana:"ハーン", jp:"はい", note:"最も基本的な肯定。「ジーハーン(जी हाँ)」にすると丁寧版になる。", cat:"基本" },
  { id:17, hi:"नहीं", romaji:"Nahin", kana:"ナヒーン", jp:"いいえ", note:"否定。文中では「…ない」の意味にも使う。「ジーナヒーン(जी नहीं)」で丁寧な「いいえ」。", cat:"基本" },
  { id:18, hi:"ठीक है", romaji:"Thik hai", kana:"ティーク ハェ", jp:"了解 / OK", note:"超頻出の相槌。承諾・確認・妥協、なんにでも使える万能語。覚えておくと何とかなる。", cat:"基本" },
  { id:19, hi:"अच्छा", romaji:"Accha", kana:"アッチャー", jp:"良い / なるほど", note:"「アッチャー…」と言うと「ふーん、なるほど」の相槌に。「良い」の形容詞としても頻出。", cat:"基本" },
  { id:20, hi:"बहुत अच्छा", romaji:"Bahut accha", kana:"バフット アッチャー", jp:"とても良い", note:"褒める時の基本形。「Very good」相当。料理や提案を褒める時にも。", cat:"基本" },
  { id:46, hi:"शायद", romaji:"Shaayad", kana:"シャーヤド", jp:"たぶん", note:"不確実な推量。「Maybe」「Perhaps」相当。返答を曖昧にしたい時に便利。", cat:"基本" },
  { id:47, hi:"मुझे नहीं पता", romaji:"Mujhe nahin pata", kana:"ムジェ ナヒーン パター", jp:"知りません / わかりません", note:"直訳「私に知識がない」。「I don't know」相当。質問に答えられない時の必須フレーズ。", cat:"基本" },
  { id:48, hi:"सच में?", romaji:"Sach mein?", kana:"サチュ メン?", jp:"本当に?", note:"驚きの相槌。「Really?」相当。サチュ=真実。会話を盛り上げる潤滑剤。", cat:"基本" },
  { id:49, hi:"फिर से", romaji:"Phir se", kana:"フィル セ", jp:"もう一度", note:"聞き返す時や繰り返しを頼む時。「कृपया फिर से बोलिए(もう一度言ってください)」のように。", cat:"基本" },
  { id:50, hi:"काफ़ी है", romaji:"Kaafi hai", kana:"カーフィー ハェ", jp:"十分です", note:"接待で「もう結構です」。料理やお茶を勧められた時の断り。カーフィー=十分な。", cat:"基本" },

  // ビジネス (id 21-25, 51-60)
  { id:21, hi:"यह मेरा कार्ड है", romaji:"Yeh mera card hai", kana:"イェ メーラー カード ハェ", jp:"これが私の名刺です", note:"名刺交換の定番。インドでも両手で渡すのが丁寧とされる。「Card」は英語そのまま。", cat:"ビジネス" },
  { id:22, hi:"क्या आप अंग्रेज़ी बोलते हैं?", romaji:"Kya aap angrezi bolte hain?", kana:"キャー アープ アングレーズィー ボールテー ハェン?", jp:"英語を話しますか?", note:"困った時の確認フレーズ。都市部のビジネスパーソンはほぼ英語OK。アングレーズィー=英語。", cat:"ビジネス" },
  { id:23, hi:"मुझे समझ नहीं आया", romaji:"Mujhe samajh nahin aaya", kana:"ムジェ サマジュ ナヒーン アーヤー", jp:"理解できませんでした", note:"相手の話が分からなかった時。遠慮せず使うべき。サマジュ=理解。", cat:"ビジネス" },
  { id:24, hi:"कृपया धीरे बोलिए", romaji:"Kripya dhire boliye", kana:"クリパヤー ディーレ ボーリエ", jp:"ゆっくり話してください", note:"インド英語・ヒンディーともに早口の人が多い。聞き取れない時の救世主。ディーレ=ゆっくり。", cat:"ビジネス" },
  { id:25, hi:"एक मिनट", romaji:"Ek minute", kana:"エーク ミニット", jp:"ちょっと待ってください", note:"「Just a minute」そのまま。英語の混じるのがインド英語・ヒンディーの特徴。エーク=1。", cat:"ビジネス" },

const state = {
  learned: new Set(),
  streak: 0,
  lastVisit: "",
  view: "today",
  detailId: null,
  showJp: false,
  todayPhrase: PHRASES[0],
};

const todayKey = () => new Date().toISOString().slice(0,10);
const dayNumber = () => Math.floor(Date.now() / 86400000);

function pickToday(learnedSet) {
  const unlearned = PHRASES.filter(p => !learnedSet.has(p.id));
  const pool = unlearned.length > 0 ? unlearned : PHRASES;
  return pool[dayNumber() % pool.length];
}

// Pick a random phrase different from current, preferring unlearned.
function pickRandomDifferent(currentId) {
  const notCurrent = PHRASES.filter(p => p.id !== currentId);
  const unlearned = notCurrent.filter(p => !state.learned.has(p.id));
  const pool = unlearned.length > 0 ? unlearned : notCurrent;
  if (pool.length === 0) return state.todayPhrase;
  return pool[Math.floor(Math.random() * pool.length)];
}

function load() {
  try {
    const l = localStorage.getItem("hd_learned");
    if (l) state.learned = new Set(JSON.parse(l));
  } catch {}
  state.streak = parseInt(localStorage.getItem("hd_streak") || "0");
  state.lastVisit = localStorage.getItem("hd_lastVisit") || "";

  const today = todayKey();
  if (state.lastVisit !== today) {
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
    state.streak = state.lastVisit === yesterday ? state.streak + 1 : 1;
    localStorage.setItem("hd_lastVisit", today);
    localStorage.setItem("hd_streak", String(state.streak));
    state.lastVisit = today;
  }
  state.todayPhrase = pickToday(state.learned);
}

function saveLearned() {
  localStorage.setItem("hd_learned", JSON.stringify([...state.learned]));
}

function speak(text) {
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "hi-IN";
    u.rate = 0.75;
    const voices = window.speechSynthesis.getVoices();
    const hi = voices.find(v => v.lang === "hi-IN") || voices.find(v => v.lang && v.lang.startsWith("hi"));
    if (hi) u.voice = hi;
    window.speechSynthesis.speak(u);
  } catch {}
}

function toggleLearned(id) {
  if (state.learned.has(id)) state.learned.delete(id);
  else state.learned.add(id);
  saveLearned();
  if (id === state.todayPhrase.id && state.learned.has(id)) {
    setTimeout(() => {
      state.todayPhrase = pickRandomDifferent(state.todayPhrase.id);
      state.showJp = false;
      render();
    }, 400);
  }
  render();
}

function setView(v) { state.view = v; if (v === "today") state.showJp = false; render(); }
function showDetail(id) { state.detailId = id; state.view = "detail"; render(); }
function nextPhrase() {
  state.todayPhrase = pickRandomDifferent(state.todayPhrase.id);
  state.showJp = false;
  render();
}
function revealJp() { state.showJp = true; render(); }
function resetAll() {
  if (!confirm("すべての学習記録をリセットしますか?")) return;
  localStorage.removeItem("hd_learned");
  localStorage.removeItem("hd_streak");
  state.learned = new Set();
  state.streak = 0;
  state.todayPhrase = pickToday(new Set());
  render();
}

const speakerSvg = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;

function esc(s) { return String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function enc(s) { return encodeURIComponent(s); }

function renderMeaning(p) {
  return `
    <div class="jp-text">${esc(p.jp)}</div>
    ${p.note ? `<div class="jp-note">${esc(p.note)}</div>` : ""}
  `;
}

function renderToday() {
  const p = state.todayPhrase;
  return `
    <div class="card card-today">
      <span class="chip">${esc(p.cat)}</span>
      <div class="hi-script big-hi">${esc(p.hi)}</div>
      <div class="romaji">${esc(p.romaji)}</div>
      <div class="kana">${esc(p.kana)}</div>
      <button class="btn-listen" onclick="speak(decodeURIComponent('${enc(p.hi)}'))" aria-label="発音を聞く">${speakerSvg}</button>
      <div class="divider"></div>
      ${state.showJp
        ? renderMeaning(p)
        : `<button class="btn-ghost" onclick="revealJp()">意味を見る</button>`}
    </div>
    <div class="actions">
      <button class="btn-primary" onclick="toggleLearned(${p.id})">${state.learned.has(p.id) ? "✓ 覚えた" : "覚えた"}</button>
      <button class="btn-ghost" onclick="nextPhrase()">次のフレーズ →</button>
    </div>
  `;
}

function renderList() {
  return `<div class="card list">` + PHRASES.map(p => `
    <div class="row" onclick="showDetail(${p.id})">
      <div class="row-text">
        <div class="hi-script row-hi">${esc(p.hi)}</div>
        <div class="row-jp">${esc(p.jp)}</div>
      </div>
      <div class="check ${state.learned.has(p.id) ? 'done' : ''}" onclick="event.stopPropagation(); toggleLearned(${p.id})">
        ${state.learned.has(p.id) ? '<span>✓</span>' : ''}
      </div>
    </div>
  `).join("") + `</div>`;
}

function renderDetail() {
  const p = PHRASES.find(x => x.id === state.detailId);
  if (!p) return "";
  return `
    <button class="btn-ghost back-btn" onclick="setView('list')">← 一覧へ</button>
    <div class="card card-today">
      <span class="chip">${esc(p.cat)}</span>
      <div class="hi-script big-hi">${esc(p.hi)}</div>
      <div class="romaji">${esc(p.romaji)}</div>
      <div class="kana">${esc(p.kana)}</div>
      <button class="btn-listen" onclick="speak(decodeURIComponent('${enc(p.hi)}'))" aria-label="発音を聞く">${speakerSvg}</button>
      <div class="divider"></div>
      ${renderMeaning(p)}
      <button class="btn-primary" style="margin-top: 24px;" onclick="toggleLearned(${p.id})">${state.learned.has(p.id) ? "✓ 覚えた" : "覚えた"}</button>
    </div>
  `;
}

function render() {
  const total = PHRASES.length;
  const progress = state.learned.size;
  const pct = Math.round((progress / total) * 100);

  let content = "";
  if (state.view === "today") content = renderToday();
  else if (state.view === "list") content = renderList();
  else if (state.view === "detail") content = renderDetail();

  document.getElementById("app").innerHTML = `
    <div class="container">
      <header>
        <div>
          <div class="brand-tag">Daily Hindi</div>
          <div class="hi-script brand-hi">हिन्दी</div>
        </div>
        <div class="streak">
          <div class="streak-label">Streak</div>
          <div class="streak-num">${state.streak}<span class="streak-unit">日</span></div>
        </div>
      </header>
      <div class="progress">
        <div class="progress-meta">
          <span>習得 ${progress} / ${total}</span>
          <span>${pct}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
      </div>
      <div class="tabs">
        <button class="tab ${state.view==='today'?'active':''}" onclick="setView('today')">今日</button>
        <button class="tab ${state.view==='list'?'active':''}" onclick="setView('list')">一覧</button>
      </div>
      ${content}
      <div class="footer">
        <button class="reset-btn" onclick="resetAll()">記録をリセット</button>
      </div>
    </div>
  `;
}

if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => {};
  window.speechSynthesis.getVoices();
}

load();
render();
</script>
</body>
</html>
